<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1200" height="750" viewBox="-0.5 -0.5 1200 750">
  <defs>
    <style type="text/css">
      .title { font: bold 24px 'Amazon Ember', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 16px 'Amazon Ember', Arial, sans-serif; fill: #b8bfc9; }
      .label { font: 14px 'Amazon Ember', Arial, sans-serif; fill: #ffffff; }
      .label-bold { font: bold 14px 'Amazon Ember', Arial, sans-serif; fill: #ffffff; }
      .small-label { font: 12px 'Amazon Ember', Arial, sans-serif; fill: #b8bfc9; }
      .weight-label { font: bold 18px 'Amazon Ember', Arial, sans-serif; fill: #2ecc71; }
      .code { font: 11px 'Consolas', monospace; fill: #e0e0e0; }
    </style>
    <linearGradient id="nlbGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#cc7a00;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="tgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1e8449;stop-opacity:0.3"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7" stroke="none"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71" stroke="none"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c" stroke="none"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9900" stroke="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="750" fill="#1a1d2e"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">NLB Weighted Routing Deep Dive</text>
  <text x="600" y="65" text-anchor="middle" class="subtitle">Active-Active Traffic Distribution with Automatic Failover</text>

  <!-- Internet Traffic -->
  <rect x="500" y="90" width="200" height="45" rx="6" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
  <text x="600" y="118" text-anchor="middle" class="label">Incoming Traffic</text>

  <!-- Arrow to NLB -->
  <line x1="600" y1="135" x2="600" y2="165" stroke="#4fc3f7" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- NLB Box -->
  <rect x="350" y="170" width="500" height="100" rx="10" fill="url(#nlbGradient)" stroke="#ff9900" stroke-width="3"/>
  <text x="600" y="200" text-anchor="middle" class="label-bold" fill="#ff9900">Network Load Balancer</text>

  <!-- Listener -->
  <rect x="480" y="215" width="240" height="40" rx="5" fill="#232f3e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="600" y="240" text-anchor="middle" class="small-label" fill="#4fc3f7">Listener: TCP/443 (TLS Passthrough)</text>

  <!-- Weighted Routing Lines -->
  <path d="M 480 270 Q 350 320 250 370" stroke="#2ecc71" stroke-width="4" fill="none" marker-end="url(#arrowhead-green)"/>
  <path d="M 720 270 Q 850 320 950 370" stroke="#2ecc71" stroke-width="4" fill="none" marker-end="url(#arrowhead-green)"/>

  <!-- Weight Labels -->
  <rect x="280" y="300" width="80" height="35" rx="5" fill="#1e4d3d" stroke="#2ecc71" stroke-width="2"/>
  <text x="320" y="323" text-anchor="middle" class="weight-label">50%</text>

  <rect x="840" y="300" width="80" height="35" rx="5" fill="#1e4d3d" stroke="#2ecc71" stroke-width="2"/>
  <text x="880" y="323" text-anchor="middle" class="weight-label">50%</text>

  <!-- Target Group A -->
  <rect x="100" y="380" width="300" height="140" rx="8" fill="url(#tgGradient)" stroke="#2ecc71" stroke-width="2"/>
  <text x="250" y="410" text-anchor="middle" class="label-bold" fill="#2ecc71">Target Group A</text>
  <text x="250" y="430" text-anchor="middle" class="small-label">EKS Cluster A Endpoints</text>

  <!-- Targets A -->
  <rect x="120" y="445" width="80" height="55" rx="4" fill="#1e3a5f" stroke="#5dade2" stroke-width="1.5"/>
  <text x="160" y="468" text-anchor="middle" class="small-label" fill="#5dade2">Pod</text>
  <text x="160" y="488" text-anchor="middle" class="code">10.0.1.10</text>

  <rect x="210" y="445" width="80" height="55" rx="4" fill="#1e3a5f" stroke="#5dade2" stroke-width="1.5"/>
  <text x="250" y="468" text-anchor="middle" class="small-label" fill="#5dade2">Pod</text>
  <text x="250" y="488" text-anchor="middle" class="code">10.0.1.11</text>

  <rect x="300" y="445" width="80" height="55" rx="4" fill="#1e3a5f" stroke="#5dade2" stroke-width="1.5"/>
  <text x="340" y="468" text-anchor="middle" class="small-label" fill="#5dade2">Pod</text>
  <text x="340" y="488" text-anchor="middle" class="code">10.0.1.12</text>

  <!-- Target Group C -->
  <rect x="800" y="380" width="300" height="140" rx="8" fill="url(#tgGradient)" stroke="#2ecc71" stroke-width="2"/>
  <text x="950" y="410" text-anchor="middle" class="label-bold" fill="#2ecc71">Target Group C</text>
  <text x="950" y="430" text-anchor="middle" class="small-label">EKS Cluster C Endpoints</text>

  <!-- Targets C -->
  <rect x="820" y="445" width="80" height="55" rx="4" fill="#1e3a5f" stroke="#5dade2" stroke-width="1.5"/>
  <text x="860" y="468" text-anchor="middle" class="small-label" fill="#5dade2">Pod</text>
  <text x="860" y="488" text-anchor="middle" class="code">10.0.3.10</text>

  <rect x="910" y="445" width="80" height="55" rx="4" fill="#1e3a5f" stroke="#5dade2" stroke-width="1.5"/>
  <text x="950" y="468" text-anchor="middle" class="small-label" fill="#5dade2">Pod</text>
  <text x="950" y="488" text-anchor="middle" class="code">10.0.3.11</text>

  <rect x="1000" y="445" width="80" height="55" rx="4" fill="#1e3a5f" stroke="#5dade2" stroke-width="1.5"/>
  <text x="1040" y="468" text-anchor="middle" class="small-label" fill="#5dade2">Pod</text>
  <text x="1040" y="488" text-anchor="middle" class="code">10.0.3.12</text>

  <!-- Health Check Section -->
  <rect x="100" y="550" width="300" height="80" rx="6" fill="#1a2d1a" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="250" y="575" text-anchor="middle" class="small-label" fill="#27ae60">Health Check: TCP/8080</text>
  <text x="250" y="595" text-anchor="middle" class="small-label">Interval: 10s | Threshold: 2</text>
  <text x="250" y="615" text-anchor="middle" class="small-label" fill="#2ecc71">Status: Healthy (3/3)</text>

  <rect x="800" y="550" width="300" height="80" rx="6" fill="#1a2d1a" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="950" y="575" text-anchor="middle" class="small-label" fill="#27ae60">Health Check: TCP/8080</text>
  <text x="950" y="595" text-anchor="middle" class="small-label">Interval: 10s | Threshold: 2</text>
  <text x="950" y="615" text-anchor="middle" class="small-label" fill="#2ecc71">Status: Healthy (3/3)</text>

  <!-- Health check arrows -->
  <line x1="250" y1="520" x2="250" y2="545" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="950" y1="520" x2="950" y2="545" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Failover Section -->
  <rect x="400" y="550" width="400" height="140" rx="8" fill="#2d1b1b" stroke="#e74c3c" stroke-width="2"/>
  <text x="600" y="580" text-anchor="middle" class="label-bold" fill="#e74c3c">Automatic Failover Scenario</text>

  <text x="420" y="610" class="small-label" fill="#ffffff">If TG-A becomes unhealthy:</text>
  <text x="420" y="635" class="small-label" fill="#e74c3c">- TG-A: 0% (unhealthy)</text>
  <text x="420" y="655" class="small-label" fill="#2ecc71">- TG-C: 100% (all traffic)</text>
  <text x="420" y="680" class="small-label" fill="#f39c12">- Recovery: Auto-rebalance when healthy</text>

  <!-- Failover arrow -->
  <path d="M 600 510 Q 600 530 700 530 Q 800 530 850 520" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="700" y="520" text-anchor="middle" class="small-label" fill="#e74c3c">Failover Path</text>

  <!-- Key Features -->
  <rect x="100" y="650" width="200" height="70" rx="5" fill="#232f3e" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="200" y="675" text-anchor="middle" class="small-label" fill="#4fc3f7">Cross-Zone LB</text>
  <text x="200" y="695" text-anchor="middle" class="small-label">Enabled for even</text>
  <text x="200" y="710" text-anchor="middle" class="small-label">distribution</text>

  <rect x="320" y="700" width="200" height="40" rx="5" fill="#232f3e" stroke="#ff9900" stroke-width="1.5"/>
  <text x="420" y="725" text-anchor="middle" class="small-label" fill="#ff9900">Connection Draining: 300s</text>

  <rect x="540" y="700" width="200" height="40" rx="5" fill="#232f3e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="640" y="725" text-anchor="middle" class="small-label" fill="#9b59b6">Preserve Client IP: Enabled</text>

  <rect x="900" y="650" width="200" height="70" rx="5" fill="#232f3e" stroke="#1abc9c" stroke-width="1.5"/>
  <text x="1000" y="675" text-anchor="middle" class="small-label" fill="#1abc9c">IP Target Type</text>
  <text x="1000" y="695" text-anchor="middle" class="small-label">Direct Pod IPs via</text>
  <text x="1000" y="710" text-anchor="middle" class="small-label">AWS LB Controller</text>
</svg>