<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1200" height="800" viewBox="-0.5 -0.5 1200 800">
  <defs>
    <style type="text/css">
      .title { font: bold 24px 'Amazon Ember', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 16px 'Amazon Ember', Arial, sans-serif; fill: #b8bfc9; }
      .label { font: 14px 'Amazon Ember', Arial, sans-serif; fill: #ffffff; }
      .label-bold { font: bold 14px 'Amazon Ember', Arial, sans-serif; fill: #ffffff; }
      .small-label { font: 12px 'Amazon Ember', Arial, sans-serif; fill: #b8bfc9; }
      .code { font: 11px 'Consolas', monospace; fill: #e0e0e0; }
      .section-title { font: bold 16px 'Amazon Ember', Arial, sans-serif; }
    </style>
    <linearGradient id="terraformGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c4ee5;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3d32a8;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="argoGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef7b4d;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c45a2c;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="awsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#cc7a00;stop-opacity:0.2"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7" stroke="none"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5c4ee5" stroke="none"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef7b4d" stroke="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="#1a1d2e"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">IaC Strategy: Terraform + ArgoCD</text>
  <text x="600" y="65" text-anchor="middle" class="subtitle">Separation of Concerns: Infrastructure vs Application</text>

  <!-- GitHub Section (Top Center) -->
  <rect x="400" y="90" width="400" height="100" rx="8" fill="#24292e" stroke="#6e7681" stroke-width="2"/>
  <text x="600" y="120" text-anchor="middle" class="label-bold" fill="#ffffff">GitHub - Source of Truth</text>

  <rect x="420" y="135" width="160" height="40" rx="4" fill="#161b22" stroke="#5c4ee5" stroke-width="1.5"/>
  <text x="500" y="160" text-anchor="middle" class="small-label" fill="#5c4ee5">infra-repo/</text>

  <rect x="620" y="135" width="160" height="40" rx="4" fill="#161b22" stroke="#ef7b4d" stroke-width="1.5"/>
  <text x="700" y="160" text-anchor="middle" class="small-label" fill="#ef7b4d">k8s-manifests/</text>

  <!-- Boundary Line -->
  <line x1="600" y1="210" x2="600" y2="780" stroke="#4a5568" stroke-width="2" stroke-dasharray="10,5"/>
  <rect x="540" y="205" width="120" height="25" rx="4" fill="#1a1d2e"/>
  <text x="600" y="222" text-anchor="middle" class="small-label" fill="#4a5568">Boundary</text>

  <!-- Left Side: Terraform (Infrastructure) -->
  <rect x="50" y="250" width="500" height="520" rx="10" fill="url(#terraformGradient)" stroke="#5c4ee5" stroke-width="2"/>
  <text x="300" y="280" text-anchor="middle" class="section-title" fill="#5c4ee5">Terraform - Infrastructure Layer</text>

  <!-- GitHub Actions CI -->
  <rect x="70" y="300" width="200" height="80" rx="6" fill="#24292e" stroke="#6e7681" stroke-width="1.5"/>
  <text x="170" y="325" text-anchor="middle" class="small-label" fill="#ffffff">GitHub Actions</text>
  <text x="80" y="350" class="code">on: push (main)</text>
  <text x="80" y="365" class="code">terraform plan/apply</text>

  <!-- Arrow from GitHub to Actions -->
  <path d="M 500 155 Q 350 155 350 220 L 170 220 L 170 295" stroke="#5c4ee5" stroke-width="2" fill="none" marker-end="url(#arrowhead-purple)"/>

  <!-- Terraform State -->
  <rect x="290" y="300" width="240" height="80" rx="6" fill="#232f3e" stroke="#ff9900" stroke-width="1.5"/>
  <text x="410" y="325" text-anchor="middle" class="small-label" fill="#ff9900">Terraform State</text>
  <text x="300" y="350" class="code">S3: terraform-state-bucket</text>
  <text x="300" y="365" class="code">DynamoDB: state-lock</text>

  <!-- Terraform Modules -->
  <rect x="70" y="400" width="460" height="180" rx="6" fill="#2d2466" stroke="#7c6edb" stroke-width="1.5"/>
  <text x="300" y="425" text-anchor="middle" class="label-bold" fill="#7c6edb">Terraform Modules</text>

  <rect x="90" y="445" width="130" height="60" rx="4" fill="#1a1540" stroke="#5c4ee5" stroke-width="1"/>
  <text x="155" y="470" text-anchor="middle" class="small-label" fill="#5c4ee5">VPC Module</text>
  <text x="155" y="490" text-anchor="middle" class="code">Subnets, NAT, IGW</text>

  <rect x="235" y="445" width="130" height="60" rx="4" fill="#1a1540" stroke="#5c4ee5" stroke-width="1"/>
  <text x="300" y="470" text-anchor="middle" class="small-label" fill="#5c4ee5">EKS Module</text>
  <text x="300" y="490" text-anchor="middle" class="code">Cluster, NodeGroup</text>

  <rect x="380" y="445" width="130" height="60" rx="4" fill="#1a1540" stroke="#5c4ee5" stroke-width="1"/>
  <text x="445" y="470" text-anchor="middle" class="small-label" fill="#5c4ee5">IAM Module</text>
  <text x="445" y="490" text-anchor="middle" class="code">Roles, Policies</text>

  <rect x="90" y="515" width="130" height="50" rx="4" fill="#1a1540" stroke="#5c4ee5" stroke-width="1"/>
  <text x="155" y="540" text-anchor="middle" class="small-label" fill="#5c4ee5">RDS Module</text>
  <text x="155" y="555" text-anchor="middle" class="code">Aurora</text>

  <rect x="235" y="515" width="130" height="50" rx="4" fill="#1a1540" stroke="#5c4ee5" stroke-width="1"/>
  <text x="300" y="540" text-anchor="middle" class="small-label" fill="#5c4ee5">ElastiCache</text>
  <text x="300" y="555" text-anchor="middle" class="code">Redis</text>

  <rect x="380" y="515" width="130" height="50" rx="4" fill="#1a1540" stroke="#5c4ee5" stroke-width="1"/>
  <text x="445" y="540" text-anchor="middle" class="small-label" fill="#5c4ee5">Secrets Mgr</text>
  <text x="445" y="555" text-anchor="middle" class="code">Secrets</text>

  <!-- AWS Resources Created -->
  <rect x="70" y="600" width="460" height="150" rx="6" fill="url(#awsGradient)" stroke="#ff9900" stroke-width="1.5"/>
  <text x="300" y="625" text-anchor="middle" class="label-bold" fill="#ff9900">AWS Resources (Created by Terraform)</text>

  <rect x="90" y="645" width="100" height="40" rx="3" fill="#232f3e" stroke="#ff9900" stroke-width="1"/>
  <text x="140" y="670" text-anchor="middle" class="small-label">VPC</text>

  <rect x="200" y="645" width="100" height="40" rx="3" fill="#232f3e" stroke="#ff9900" stroke-width="1"/>
  <text x="250" y="670" text-anchor="middle" class="small-label">EKS x2</text>

  <rect x="310" y="645" width="100" height="40" rx="3" fill="#232f3e" stroke="#ff9900" stroke-width="1"/>
  <text x="360" y="670" text-anchor="middle" class="small-label">IAM Roles</text>

  <rect x="420" y="645" width="100" height="40" rx="3" fill="#232f3e" stroke="#ff9900" stroke-width="1"/>
  <text x="470" y="670" text-anchor="middle" class="small-label">Aurora</text>

  <rect x="90" y="695" width="100" height="40" rx="3" fill="#232f3e" stroke="#ff9900" stroke-width="1"/>
  <text x="140" y="720" text-anchor="middle" class="small-label">Redis</text>

  <rect x="200" y="695" width="100" height="40" rx="3" fill="#232f3e" stroke="#ff9900" stroke-width="1"/>
  <text x="250" y="720" text-anchor="middle" class="small-label">NLB</text>

  <rect x="310" y="695" width="100" height="40" rx="3" fill="#232f3e" stroke="#ff9900" stroke-width="1"/>
  <text x="360" y="720" text-anchor="middle" class="small-label">ACM</text>

  <rect x="420" y="695" width="100" height="40" rx="3" fill="#232f3e" stroke="#ff9900" stroke-width="1"/>
  <text x="470" y="720" text-anchor="middle" class="small-label">S3</text>

  <!-- Right Side: ArgoCD (Application) -->
  <rect x="650" y="250" width="500" height="520" rx="10" fill="url(#argoGradient)" stroke="#ef7b4d" stroke-width="2"/>
  <text x="900" y="280" text-anchor="middle" class="section-title" fill="#ef7b4d">ArgoCD - Application Layer</text>

  <!-- ArgoCD Controller -->
  <rect x="670" y="300" width="200" height="80" rx="6" fill="#3d2520" stroke="#ef7b4d" stroke-width="1.5"/>
  <text x="770" y="325" text-anchor="middle" class="small-label" fill="#ef7b4d">ArgoCD Controller</text>
  <text x="680" y="350" class="code">Sync: Auto/Manual</text>
  <text x="680" y="365" class="code">Self-Heal: Enabled</text>

  <!-- Arrow from GitHub to ArgoCD -->
  <path d="M 700 155 Q 850 155 850 220 L 770 220 L 770 295" stroke="#ef7b4d" stroke-width="2" fill="none" marker-end="url(#arrowhead-orange)"/>

  <!-- Git Sync indicator -->
  <rect x="890" y="300" width="240" height="80" rx="6" fill="#3d2520" stroke="#ef7b4d" stroke-width="1.5"/>
  <text x="1010" y="325" text-anchor="middle" class="small-label" fill="#ef7b4d">Git Sync</text>
  <text x="900" y="350" class="code">Poll: 3 min / Webhook</text>
  <text x="900" y="365" class="code">Diff detection + apply</text>

  <!-- Application Manifests -->
  <rect x="670" y="400" width="460" height="180" rx="6" fill="#4d2d25" stroke="#f4a261" stroke-width="1.5"/>
  <text x="900" y="425" text-anchor="middle" class="label-bold" fill="#f4a261">Application Manifests</text>

  <rect x="690" y="445" width="130" height="60" rx="4" fill="#2d1a15" stroke="#ef7b4d" stroke-width="1"/>
  <text x="755" y="470" text-anchor="middle" class="small-label" fill="#ef7b4d">Helm Charts</text>
  <text x="755" y="490" text-anchor="middle" class="code">values.yaml</text>

  <rect x="835" y="445" width="130" height="60" rx="4" fill="#2d1a15" stroke="#ef7b4d" stroke-width="1"/>
  <text x="900" y="470" text-anchor="middle" class="small-label" fill="#ef7b4d">Kustomize</text>
  <text x="900" y="490" text-anchor="middle" class="code">overlays/</text>

  <rect x="980" y="445" width="130" height="60" rx="4" fill="#2d1a15" stroke="#ef7b4d" stroke-width="1"/>
  <text x="1045" y="470" text-anchor="middle" class="small-label" fill="#ef7b4d">Raw YAML</text>
  <text x="1045" y="490" text-anchor="middle" class="code">manifests/</text>

  <rect x="690" y="515" width="200" height="50" rx="4" fill="#2d1a15" stroke="#ef7b4d" stroke-width="1"/>
  <text x="790" y="540" text-anchor="middle" class="small-label" fill="#ef7b4d">ApplicationSet</text>
  <text x="790" y="555" text-anchor="middle" class="code">Multi-cluster generator</text>

  <rect x="910" y="515" width="200" height="50" rx="4" fill="#2d1a15" stroke="#ef7b4d" stroke-width="1"/>
  <text x="1010" y="540" text-anchor="middle" class="small-label" fill="#ef7b4d">Sync Waves</text>
  <text x="1010" y="555" text-anchor="middle" class="code">Ordered deployment</text>

  <!-- EKS Clusters (Deployed to) -->
  <rect x="670" y="600" width="460" height="150" rx="6" fill="url(#awsGradient)" stroke="#ff9900" stroke-width="1.5"/>
  <text x="900" y="625" text-anchor="middle" class="label-bold" fill="#ff9900">EKS Clusters (Deployed by ArgoCD)</text>

  <!-- Cluster A -->
  <rect x="690" y="645" width="200" height="90" rx="5" fill="#232f3e" stroke="#3498db" stroke-width="1.5"/>
  <text x="790" y="670" text-anchor="middle" class="small-label" fill="#3498db">EKS Cluster A (AZ-a)</text>
  <text x="700" y="695" class="code">- NGF, Istio</text>
  <text x="700" y="710" class="code">- App Deployments</text>
  <text x="700" y="725" class="code">- Karpenter, KEDA</text>

  <!-- Cluster C -->
  <rect x="910" y="645" width="200" height="90" rx="5" fill="#232f3e" stroke="#e056fd" stroke-width="1.5"/>
  <text x="1010" y="670" text-anchor="middle" class="small-label" fill="#e056fd">EKS Cluster C (AZ-c)</text>
  <text x="920" y="695" class="code">- NGF, Istio</text>
  <text x="920" y="710" class="code">- App Deployments</text>
  <text x="920" y="725" class="code">- Karpenter, KEDA</text>

  <!-- Sync arrows from ArgoCD to clusters -->
  <path d="M 770 380 L 770 450 Q 770 550 790 550 L 790 640" stroke="#ef7b4d" stroke-width="2" fill="none" marker-end="url(#arrowhead-orange)"/>
  <path d="M 850 380 L 1010 450 Q 1010 550 1010 550 L 1010 640" stroke="#ef7b4d" stroke-width="2" fill="none" marker-end="url(#arrowhead-orange)"/>
</svg>