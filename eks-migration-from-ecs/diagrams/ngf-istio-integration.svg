<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1200" height="850" viewBox="-0.5 -0.5 1200 850">
  <defs>
    <style type="text/css">
      .title { font: bold 24px 'Amazon Ember', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 16px 'Amazon Ember', Arial, sans-serif; fill: #b8bfc9; }
      .label { font: 14px 'Amazon Ember', Arial, sans-serif; fill: #ffffff; }
      .label-bold { font: bold 14px 'Amazon Ember', Arial, sans-serif; fill: #ffffff; }
      .small-label { font: 12px 'Amazon Ember', Arial, sans-serif; fill: #b8bfc9; }
      .code { font: 11px 'Consolas', monospace; fill: #e0e0e0; }
      .team-label { font: bold 12px 'Amazon Ember', Arial, sans-serif; }
    </style>
    <linearGradient id="ngfGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#009977;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="istioGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6c3483;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="podGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2471a3;stop-opacity:0.3"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7" stroke="none"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4aa" stroke="none"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9b59b6" stroke="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="850" fill="#1a1d2e"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">NGINX Gateway Fabric + Istio Integration</text>
  <text x="600" y="65" text-anchor="middle" class="subtitle">Gateway API for North-South | Istio Service Mesh for East-West</text>

  <!-- Traffic Flow Header -->
  <rect x="500" y="85" width="200" height="40" rx="5" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
  <text x="600" y="110" text-anchor="middle" class="label">External Traffic</text>

  <!-- NLB -->
  <line x1="600" y1="125" x2="600" y2="150" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="480" y="155" width="240" height="45" rx="6" fill="#232f3e" stroke="#ff9900" stroke-width="2"/>
  <text x="600" y="183" text-anchor="middle" class="label" fill="#ff9900">NLB (L4)</text>

  <!-- Arrow to NGF -->
  <line x1="600" y1="200" x2="600" y2="230" stroke="#00d4aa" stroke-width="3" marker-end="url(#arrowhead-green)"/>

  <!-- Platform Team Section -->
  <rect x="50" y="240" width="520" height="280" rx="8" fill="#1a2d2d" stroke="#00d4aa" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="70" y="265" class="team-label" fill="#00d4aa">Platform Team Responsibility</text>

  <!-- NGINX Gateway Fabric Section -->
  <rect x="70" y="280" width="480" height="220" rx="6" fill="url(#ngfGradient)" stroke="#00d4aa" stroke-width="2"/>
  <text x="310" y="305" text-anchor="middle" class="label-bold" fill="#00d4aa">NGINX Gateway Fabric</text>

  <!-- GatewayClass -->
  <rect x="90" y="320" width="140" height="70" rx="5" fill="#0d3d3d" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="160" y="345" text-anchor="middle" class="small-label" fill="#00d4aa">GatewayClass</text>
  <text x="160" y="365" text-anchor="middle" class="code">nginx</text>
  <text x="160" y="380" text-anchor="middle" class="small-label">Controller ref</text>

  <!-- Gateway -->
  <rect x="250" y="320" width="140" height="70" rx="5" fill="#0d3d3d" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="320" y="345" text-anchor="middle" class="small-label" fill="#00d4aa">Gateway</text>
  <text x="320" y="365" text-anchor="middle" class="code">main-gateway</text>
  <text x="320" y="380" text-anchor="middle" class="small-label">Listeners: 80, 443</text>

  <!-- Arrow between GatewayClass and Gateway -->
  <line x1="230" y1="355" x2="245" y2="355" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arrowhead-green)"/>

  <!-- NGF Features -->
  <rect x="90" y="405" width="200" height="80" rx="4" fill="#0a2a2a" stroke="#4fc3f7" stroke-width="1"/>
  <text x="190" y="425" text-anchor="middle" class="small-label" fill="#4fc3f7">L4/L7 Routing</text>
  <text x="100" y="445" class="code">- TLS termination</text>
  <text x="100" y="460" class="code">- Path-based routing</text>
  <text x="100" y="475" class="code">- Header matching</text>

  <rect x="310" y="405" width="220" height="80" rx="4" fill="#0a2a2a" stroke="#4fc3f7" stroke-width="1"/>
  <text x="420" y="425" text-anchor="middle" class="small-label" fill="#4fc3f7">Traffic Management</text>
  <text x="320" y="445" class="code">- Rate limiting</text>
  <text x="320" y="460" class="code">- Request/Response mods</text>
  <text x="320" y="475" class="code">- Traffic splitting</text>

  <!-- App Team Section -->
  <rect x="630" y="240" width="520" height="280" rx="8" fill="#2d1b2d" stroke="#e056fd" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="650" y="265" class="team-label" fill="#e056fd">App Team Responsibility</text>

  <!-- HTTPRoute Section -->
  <rect x="650" y="280" width="480" height="220" rx="6" fill="url(#ngfGradient)" stroke="#00d4aa" stroke-width="2"/>
  <text x="890" y="305" text-anchor="middle" class="label-bold" fill="#00d4aa">HTTPRoute (Gateway API)</text>

  <!-- HTTPRoute boxes -->
  <rect x="670" y="320" width="130" height="85" rx="4" fill="#0d3d3d" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="735" y="345" text-anchor="middle" class="small-label" fill="#00d4aa">HTTPRoute</text>
  <text x="735" y="365" text-anchor="middle" class="code">/api/*</text>
  <text x="735" y="385" text-anchor="middle" class="small-label">-> api-svc</text>

  <rect x="815" y="320" width="130" height="85" rx="4" fill="#0d3d3d" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="880" y="345" text-anchor="middle" class="small-label" fill="#00d4aa">HTTPRoute</text>
  <text x="880" y="365" text-anchor="middle" class="code">/users/*</text>
  <text x="880" y="385" text-anchor="middle" class="small-label">-> user-svc</text>

  <rect x="960" y="320" width="130" height="85" rx="4" fill="#0d3d3d" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="1025" y="345" text-anchor="middle" class="small-label" fill="#00d4aa">HTTPRoute</text>
  <text x="1025" y="365" text-anchor="middle" class="code">/products/*</text>
  <text x="1025" y="385" text-anchor="middle" class="small-label">-> product-svc</text>

  <!-- VirtualService (optional Istio) -->
  <rect x="670" y="420" width="440" height="70" rx="4" fill="#2d1b4e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="890" y="445" text-anchor="middle" class="small-label" fill="#9b59b6">VirtualService (Optional - Istio L7)</text>
  <text x="680" y="465" class="code">Canary: 90/10 split | Retry: 3 attempts | Timeout: 30s</text>
  <text x="680" y="480" class="code">Circuit breaker | Fault injection for testing</text>

  <!-- Arrow from NGF to Istio -->
  <line x1="600" y1="520" x2="600" y2="560" stroke="#9b59b6" stroke-width="3" marker-end="url(#arrowhead-purple)"/>
  <text x="610" y="545" class="small-label" fill="#9b59b6">Internal Traffic</text>

  <!-- Istio Service Mesh Section -->
  <rect x="150" y="570" width="900" height="250" rx="8" fill="url(#istioGradient)" stroke="#9b59b6" stroke-width="2"/>
  <text x="600" y="595" text-anchor="middle" class="label-bold" fill="#9b59b6">Istio Service Mesh (East-West Traffic)</text>

  <!-- mTLS indicator -->
  <rect x="170" y="610" width="150" height="50" rx="4" fill="#3d1b4e" stroke="#e056fd" stroke-width="1.5"/>
  <text x="245" y="635" text-anchor="middle" class="small-label" fill="#e056fd">mTLS Enabled</text>
  <text x="245" y="650" text-anchor="middle" class="code">Auto cert rotation</text>

  <!-- Application Pods with Sidecars -->
  <rect x="180" y="680" width="180" height="120" rx="5" fill="url(#podGradient)" stroke="#3498db" stroke-width="1.5"/>
  <text x="270" y="705" text-anchor="middle" class="small-label" fill="#3498db">API Service Pod</text>
  <rect x="195" y="715" width="70" height="35" rx="3" fill="#1a3a5f" stroke="#5dade2" stroke-width="1"/>
  <text x="230" y="738" text-anchor="middle" class="code">App</text>
  <rect x="275" y="715" width="70" height="35" rx="3" fill="#4a1b5e" stroke="#9b59b6" stroke-width="1"/>
  <text x="310" y="738" text-anchor="middle" class="code">Envoy</text>
  <text x="270" y="775" text-anchor="middle" class="small-label">Sidecar Proxy</text>

  <rect x="400" y="680" width="180" height="120" rx="5" fill="url(#podGradient)" stroke="#3498db" stroke-width="1.5"/>
  <text x="490" y="705" text-anchor="middle" class="small-label" fill="#3498db">User Service Pod</text>
  <rect x="415" y="715" width="70" height="35" rx="3" fill="#1a3a5f" stroke="#5dade2" stroke-width="1"/>
  <text x="450" y="738" text-anchor="middle" class="code">App</text>
  <rect x="495" y="715" width="70" height="35" rx="3" fill="#4a1b5e" stroke="#9b59b6" stroke-width="1"/>
  <text x="530" y="738" text-anchor="middle" class="code">Envoy</text>
  <text x="490" y="775" text-anchor="middle" class="small-label">Sidecar Proxy</text>

  <rect x="620" y="680" width="180" height="120" rx="5" fill="url(#podGradient)" stroke="#3498db" stroke-width="1.5"/>
  <text x="710" y="705" text-anchor="middle" class="small-label" fill="#3498db">Product Service Pod</text>
  <rect x="635" y="715" width="70" height="35" rx="3" fill="#1a3a5f" stroke="#5dade2" stroke-width="1"/>
  <text x="670" y="738" text-anchor="middle" class="code">App</text>
  <rect x="715" y="715" width="70" height="35" rx="3" fill="#4a1b5e" stroke="#9b59b6" stroke-width="1"/>
  <text x="750" y="738" text-anchor="middle" class="code">Envoy</text>
  <text x="710" y="775" text-anchor="middle" class="small-label">Sidecar Proxy</text>

  <rect x="840" y="680" width="180" height="120" rx="5" fill="url(#podGradient)" stroke="#3498db" stroke-width="1.5"/>
  <text x="930" y="705" text-anchor="middle" class="small-label" fill="#3498db">Review Service Pod</text>
  <rect x="855" y="715" width="70" height="35" rx="3" fill="#1a3a5f" stroke="#5dade2" stroke-width="1"/>
  <text x="890" y="738" text-anchor="middle" class="code">App</text>
  <rect x="935" y="715" width="70" height="35" rx="3" fill="#4a1b5e" stroke="#9b59b6" stroke-width="1"/>
  <text x="970" y="738" text-anchor="middle" class="code">Envoy</text>
  <text x="930" y="775" text-anchor="middle" class="small-label">Sidecar Proxy</text>

  <!-- mTLS connections between pods -->
  <line x1="360" y1="740" x2="395" y2="740" stroke="#e056fd" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="580" y1="740" x2="615" y2="740" stroke="#e056fd" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="800" y1="740" x2="835" y2="740" stroke="#e056fd" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="350" y="610" width="180" height="50" rx="4" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1"/>
  <text x="440" y="630" text-anchor="middle" class="small-label" fill="#2ecc71">Observability</text>
  <text x="440" y="648" text-anchor="middle" class="code">Metrics, Traces, Logs</text>

  <rect x="550" y="610" width="180" height="50" rx="4" fill="#2a1a2a" stroke="#e74c3c" stroke-width="1"/>
  <text x="640" y="630" text-anchor="middle" class="small-label" fill="#e74c3c">Resilience</text>
  <text x="640" y="648" text-anchor="middle" class="code">Retry, Timeout, CB</text>

  <rect x="750" y="610" width="180" height="50" rx="4" fill="#2a2a1a" stroke="#f39c12" stroke-width="1"/>
  <text x="840" y="630" text-anchor="middle" class="small-label" fill="#f39c12">Traffic Control</text>
  <text x="840" y="648" text-anchor="middle" class="code">Canary, A/B, Mirror</text>
</svg>